# Clash Mi / Mihomo 覆写配置
# 由 Shadowrocket 配置转换而来，尽量保持原有分组、规则与 DNS 逻辑不变。
#
# 说明：
# - 以下 Shadowrocket 专有项没有稳定的 1:1 Clash 映射，故未直接写入：
#   bypass-system, dns-direct-system, icmp-auto-reply,
#   always-reject-url-rewrite, private-ip-answer,
#   dns-direct-fallback-proxy, udp-policy-not-supported-behaviour,
#   block-quic(all-proxy)
# - 此覆写文件默认假定你的基础配置/订阅里已经存在以下代理提供者或同名代理集合：
#   MITCE, SUBSCHECK, 白月光
# - 如 Clash Mi 的“覆写/扩展配置”对数组采用替换而不是追加，本文件中的
#   proxy-groups / rules / rewrite / mitm 会以本文件为准。

# DNS
dns:
  enable: true
  ipv6: true
  use-hosts: true
  use-system-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - system
  nameserver-policy:
    '+.apple.com':
      - system
    '+.icloud.com':
      - system

# TUN
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  route-exclude-address:
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 255.255.255.255/32
    - 239.255.255.250/32
  dns-hijack:
    - 8.8.8.8:53
    - 8.8.4.4:53

# Hosts
hosts:
  localhost: 127.0.0.1

