# Clash Mi / Mihomo 覆写配置（通用兼容版）
# 说明：
# 1) 这版不依赖 MITCE / SUBSCHECK / 白月光 这些 provider 名称
# 2) 地区分组直接从“现有全部节点”里按关键词筛选
# 3) 保留你的原有分组名、规则链接、DNS 与直连逻辑
# 4) URL Rewrite / MITM 先保留为注释，优先保证导入稳定

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: true
  use-hosts: true
  use-system-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - system
  nameserver-policy:
    '+.apple.com':
      - system
    '+.icloud.com':
      - system

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 8.8.8.8:53
    - 8.8.4.4:53
  route-exclude-address:
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 239.255.255.250/32
    - 255.255.255.255/32

hosts:
  localhost: 127.0.0.1

proxy-groups:
  # 兼容辅助组
  - name: "🧩 全部节点"
    type: select
    include-all: true
    exclude-type: direct

  - name: "♻️ 自动选择"
    type: url-test
    include-all: true
    exclude-type: direct
    tolerance: 10
    interval: 300

  # 保留你原来的三个来源组名，但改成通用可用
  - name: "Ⓜ️ Mitce"
    type: select
    include-all: true
    exclude-type: direct

  - name: "🌐 Subscheck"
    type: select
    include-all: true
    exclude-type: direct

  - name: "☪️ 白月光"
    type: select
    include-all: true
    exclude-type: direct

  # 地区组：直接按全部节点筛选
  - name: "🇸🇬 SG狮城"
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇸🇬|\\bSG\\b|新加坡|狮城|singapore)"

  - name: "🇯🇵 JP日本"
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇯🇵|\\bJP\\b|日本|japan)"

  - name: "🇺🇸 US美国"
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇺🇸|\\bUS\\b|美国|united states|unitedstates|america)"

  - name: "🇭🇰 HK香港"
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇭🇰|\\bHK\\b|香港|hong kong|hongkong)"

  - name: "🚩 TW台湾"
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇹🇼|\\bTW\\b|台湾|台灣|taiwan)"

  # 业务组：尽量保留你原顺序和逻辑
  - name: "🚀 手动选择"
    type: select
    proxies:
      - DIRECT
      - "Ⓜ️ Mitce"
      - "🌐 Subscheck"
      - "☪️ 白月光"
      - "🇸🇬 SG狮城"
      - "🇯🇵 JP日本"
      - "🇺🇸 US美国"
      - "🇭🇰 HK香港"
      - "🚩 TW台湾"
      - "♻️ 自动选择"
      - "🧩 全部节点"

  - name: "📱 Telegram"
    type: select
    proxies:
      - "🇸🇬 SG狮城"
      - "🇯🇵 JP日本"
      - "🇺🇸 US美国"
      - "♻️ 自动选择"
      - "🧩 全部节点"

  - name: "💽 Spotify"
