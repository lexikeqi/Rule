proxy-groups:
  - name: ALL
    type: select
    include-all: true
    exclude-type: direct

  - name: AUTO
    type: url-test
    include-all: true
    exclude-type: direct
    tolerance: 10
    interval: 300

  - name: MITCE
    type: select
    include-all: true
    exclude-type: direct

  - name: SUBSCHECK
    type: select
    include-all: true
    exclude-type: direct

  - name: BAIYUEGUANG
    type: select
    include-all: true
    exclude-type: direct

  - name: SG
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇸🇬|\\bSG\\b|新加坡|狮城|singapore)"

  - name: JP
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇯🇵|\\bJP\\b|日本|japan)"

  - name: US
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇺🇸|\\bUS\\b|美国|united states|unitedstates|america)"

  - name: HK
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇭🇰|\\bHK\\b|香港|hong kong|hongkong)"

  - name: TW
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(🇹🇼|\\bTW\\b|台湾|台灣|taiwan)"

  - name: MANUAL
    type: select
    proxies:
      - DIRECT
      - MITCE
      - SUBSCHECK
      - BAIYUEGUANG
      - SG
      - JP
      - US
      - HK
      - TW
      - AUTO
      - ALL

  - name: TELEGRAM
    type: select
    proxies:
      - SG
      - JP
      - US
      - AUTO
      - ALL

  - name: SPOTIFY
    type: select
    proxies:
      - SG
      - JP
      - US
      - HK
      - TW
      - AUTO
      - ALL

  - name: AI
    type: select
    proxies:
      - SG
      - JP
      - US
      - AUTO
      - ALL

  - name: YOUTUBE
    type: select
    proxies:
      - US
      - SG
      - JP
      - HK
      - TW
      - AUTO
      - ALL

  - name: GITHUB
    type: select
    proxies:
      - DIRECT
      - SG
      - US
      - AUTO
      - ALL

  - name: TIKTOK
    type: select
    proxies:
      - US
      - SG
      - JP
      - HK
      - TW
      - AUTO
      - ALL

  - name: TWITTER
    type: select
    proxies:
      - SG
      - US
      - AUTO
      - ALL

  - name: DOUYIN
    type: select
    proxies:
      - DIRECT
      - SG
      - JP
      - US
      - HK
      - TW
      - AUTO
      - ALL

  - name: JINRITOUTIAO
    type: select
    proxies:
      - DIRECT
      - SG
      - JP
      - US
      - HK
      - TW
      - AUTO
      - ALL

  - name: APPLE
    type: select
    proxies:
      - DIRECT
      - SG
      - US
      - AUTO
      - ALL

  - name: GOOGLE
    type: select
    proxies:
      - SG
      - JP
      - US
      - HK
      - TW
      - AUTO
      - ALL

  - name: MICROSOFT
    type: select
    proxies:
      - DIRECT
      - SG
      - US
      - AUTO
      - ALL

rules:
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - DOMAIN,localhost,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN,captive.apple.com,DIRECT
  - DOMAIN-SUFFIX,ccb.com,DIRECT
  - DOMAIN-SUFFIX,abchina.com.cn,DIRECT
  - DOMAIN-SUFFIX,psbc.com,DIRECT
  - DOMAIN,www.baidu.com,DIRECT
  - DOMAIN,www.163.com,DIRECT

  - RULE-SET,aiweibaobei,REJECT
  - RULE-SET,antiad,REJECT

  - RULE-SET,telegram,TELEGRAM
  - RULE-SET,spotify,SPOTIFY
  - RULE-SET,ai,AI
  - RULE-SET,youtube,YOUTUBE
  - RULE-SET,github,GITHUB
  - RULE-SET,tiktok,TIKTOK
  - RULE-SET,twitter,TWITTER
  - RULE-SET,douyin,DOUYIN
  - RULE-SET,jinritoutiao,JINRITOUTIAO
  - RULE-SET,apple,APPLE
  - RULE-SET,google,GOOGLE
  - RULE-SET,microsoft,MICROSOFT

  - RULE-SET,global,MANUAL
  - MATCH,DIRECT
