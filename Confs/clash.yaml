rules:
  # 对应原 skip-proxy / bypass-system
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - DOMAIN,localhost,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN,captive.apple.com,DIRECT
  - DOMAIN-SUFFIX,ccb.com,DIRECT
  - DOMAIN-SUFFIX,abchina.com.cn,DIRECT
  - DOMAIN-SUFFIX,psbc.com,DIRECT
  - DOMAIN,www.baidu.com,DIRECT
  - DOMAIN,www.163.com,DIRECT

  - RULE-SET,aiweibaobei,REJECT
  - RULE-SET,antiad,REJECT

  - RULE-SET,telegram,"📱 Telegram"
  - RULE-SET,spotify,"💽 Spotify"
  - RULE-SET,ai,"🤖 AI"
  - RULE-SET,youtube,"▶️ Youtube"
  - RULE-SET,github,"💻 Github"
  - RULE-SET,tiktok,"🎵 Tiktok"
  - RULE-SET,twitter,"❎ Twitter"
  - RULE-SET,douyin,"🎵 抖音"
  - RULE-SET,jinritoutiao,"📕 今日头条"
  - RULE-SET,apple,"🍎 Apple"
  - RULE-SET,google,"🔵 Google"
